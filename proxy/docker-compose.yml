version: '3.8'

services:
  proxy:
    image: nginx:alpine
    container_name: teamgr-proxy
    restart: unless-stopped
    ports:
      - "${LISTEN_PORT:-443}:${LISTEN_PORT:-443}"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./ssl:/etc/nginx/ssl
    entrypoint: ["/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://localhost:${LISTEN_PORT:-443}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
