version: '3.8'

services:
  teamgr:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: teamgr-app
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ../config:/app/config
      - ../data:/app/data
      - ../scripts:/workspace/scripts:ro
      - ../backend/app:/app/app:ro
    environment:
      - TEAMGR_CONFIG=/app/config/config.yaml
      - TEAMGR_DATA_DIR=/app/data
      - PYTHONPATH=/app

  tacox:
    image: taco-0.tencentcloudcr.com/taco/taco_x_prod:v0.0.1-260302-default
    container_name: teamgr-tacox
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface/hub/models--Qwen--Qwen3-30B-A3B-Instruct-2507:/models/Qwen3-30B-A3B
      - ../local_llm/qwen3_moe_30b_taco_x_config:/workspace/qwen3_moe_30b_taco_x_config:ro
    expose:
      - "18080"
    entrypoint: >
      bash -c "python3 -m taco_x.api_server
      --model_dir /models/Qwen3-30B-A3B/snapshots/0d7cf23991f47feeb3a57ecb4c9cee8ea4a17bfe
      --model_type qwen3_moe_30b
      --config_dir /workspace/qwen3_moe_30b_taco_x_config
      --port 18080
      --tp 2
      --opt-level 3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,json; urllib.request.urlopen(urllib.request.Request('http://localhost:18080/v1/chat/completions',data=json.dumps({'messages':[{'role':'user','content':'hi'}],'max_tokens':1}).encode(),headers={'Content-Type':'application/json'}))"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 600s

  nginx:
    image: nginx:alpine
    container_name: teamgr-nginx
    restart: unless-stopped
    ports:
      - "6443:6443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-entrypoint.sh:/nginx-entrypoint.sh:ro
      - ../ssl:/etc/nginx/ssl
    entrypoint: ["/nginx-entrypoint.sh"]
    depends_on:
      - teamgr
