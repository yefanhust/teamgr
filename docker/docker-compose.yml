version: '3.8'

services:
  teamgr:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: teamgr-app
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ../config:/app/config
      - ../data:/app/data
      - ../scripts:/workspace/scripts:ro
      - ../backend/app:/app/app:ro
    environment:
      - TEAMGR_CONFIG=/app/config/config.yaml
      - TEAMGR_DATA_DIR=/app/data
      - PYTHONPATH=/app

  sglang:
    image: lmsysorg/sglang:latest
    container_name: teamgr-sglang
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    expose:
      - "18080"
    entrypoint: >
      bash -c "python3 -m sglang.launch_server
      --model-path google/gemma-4-26B-A4B-it
      --served-model-name Gemma-4-26B-A4B
      --tp 2
      --port 18080
      --host 0.0.0.0"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18080/health')"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 600s

  nginx:
    image: nginx:alpine
    container_name: teamgr-nginx
    restart: unless-stopped
    ports:
      - "6443:6443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-entrypoint.sh:/nginx-entrypoint.sh:ro
      - ../ssl:/etc/nginx/ssl
    entrypoint: ["/nginx-entrypoint.sh"]
    depends_on:
      - teamgr
