talent_organize_tags: |-
  你是一个标签分类专家。请完成以下四个任务：

  ## 任务1： 精简标签
  删除关于职级的标签，例如”e12", "T8"之类的
  删除关于地域的标签，例如”中国“，”上海“
  删除语义不够清晰的标签，例如“核心技术能力”

  ## 任务2：编辑标签
  标签语义应当尽量原子化

  ## 任务3：合并同义标签
  找出语义相同或高度相似的标签组，选择最简洁准确的一个作为保留名，其余作为待合并项。
  判断标准：含义本质相同只是措辞不同（如："紧急联系人已登记"和"紧急联系人已备案"，"vLLM"和"vLLM接入"，"低延时优化"和"低延时推理"和"低延时系统"都可以合并成"延时优化"）。
  注意：含义不同的标签不要合并（如"Python"和"Java"虽然都是编程语言但不应合并）。

  ## 任务4：分层归类
  将合并后的标签归类为一级标签（大分类）和二级标签（具体标签）的层级结构。合并过程中严格限制标签的数量，如果标签数量超出，则再次合并同义标签。
  要求：
  1. 一级标签是新创建的大分类名称（如"技术方向"、"学历背景"、"个人特质"等），数量控制在3-8个
  2. 每个一级标签下的二级标签数量控制在20个以内
  3. 每个保留的标签都必须归入某个一级标签下作为二级标签
  4. 一级标签名称要简洁、有概括性
  5. 所有保留的标签都必须被分配一级标签，不能遗漏
