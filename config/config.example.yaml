# TeaMgr 配置文件示例
# 复制此文件为 config.yaml 并填入真实配置

# 网站认证密码 (留空则进入无密码模式，会显示警告页)
auth:
  password: ""
  jwt_secret: "change-this-to-a-random-string"

# Gemini API 配置
gemini:
  api_key: "your-gemini-api-key-here"
  current_model: "gemini-2.5-flash"
  available_models:
    - "gemini-2.5-flash"
    - "gemini-2.5-pro"
    - "gemini-2.5-flash-lite"
    - "gemini-3-flash-preview"

# 本地模型配置 (通过 SGLang 部署的 OpenAI 兼容服务)
local_models:
  - name: "Gemma-4-26B-A4B"
    api_base: "http://sglang:18080/v1"  # docker-compose 内部服务名
    model_id: "Gemma-4-26B-A4B"         # 与 sglang --served-model-name 一致
    # api_key: ""                           # 如需 API key 可在此配置

# 腾讯云 COS 备份配置
cos:
  enabled: false
  secret_id: "your-cos-secret-id"
  secret_key: "your-cos-secret-key"
  region: "ap-guangzhou"
  bucket: "your-bucket-name"
  backup_prefix: "teamgr-backup/"

# 安全配置
security:
  rate_limit_per_minute: 5
  ban_thresholds:
    - fails: 5
      duration_minutes: 30
    - fails: 10
      duration_minutes: 120
    - fails: 20
      duration_minutes: 1440

# 流光剪影（手记）配置
diary:
  password: ""                    # 手记页面独立密码，留空则不启用手记功能

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
  cors_origins:              # 允许的跨域来源，不配置则允许所有
    - "https://your-domain.com"

# 消息推送配置（龙图阁）
notification:
  enabled: false
  bots:
    - id: "default"
      name: "工作通知"
      channel: "wecom"                # 渠道类型：wecom
      webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY"
      enabled: false
      functions:                      # 已订阅的推送功能
        - trigger: "scheduled_query"  # 每日定时查询
          cron_hour: 5
          cron_minute: 0
        - trigger: "idea_insight"     # 灵感洞见
          cron_hour: 3
          cron_minute: 30
        - trigger: "todo_analysis"    # 任务效率分析
          cron_hour: 4
          cron_minute: 0
        - trigger: "todo_deadline"    # 任务截止提醒
          cron_hour: 8
          cron_minute: 0
        - trigger: "todo_daily_list"  # 每日任务清单
          cron_hour: 8
          cron_minute: 5
        # 备份失败告警无需订阅，会自动推送到所有已启用的机器人
    # Bark 推送机器人示例（iOS 推送通知）
    # - id: "bark-kitchen"
    #   name: "每日食谱推送"
    #   channel: "bark"
    #   bark_server: "https://api.day.app"    # Bark 服务器地址（默认官方服务器）
    #   bark_device_key: "YOUR_DEVICE_KEY"    # 打开 Bark App 获取
    #   enabled: false
    #   functions:
    #     - trigger: "daily_menu"             # 每日食谱推送
    #       cron_hour: 20
    #       cron_minute: 5

# 御膳房配置
kitchen:
  adult_count: 1                  # 大人数量（默认1个）
  bark:                           # Bark 推送配置（独立于通知系统的 Bark bot）
    enabled: false
    server_url: "https://api.day.app"   # Bark 服务器地址
    device_key: ""                      # Bark 设备密钥（打开 Bark App 获取）

# 定时任务调度配置
schedulers:
  daily_scheduled_queries:     # 每日定时查询（数据生成）
    cron_hour: 5
    cron_minute: 0
  daily_idea_aggregation:      # 灵感洞见聚合
    cron_hour: 3
    cron_minute: 0
  daily_todo_analysis:         # 任务效率分析
    cron_hour: 3
    cron_minute: 30
  daily_duration_stats:        # 任务耗时统计
    cron_hour: 3
    cron_minute: 35
  daily_diary_comment:          # 手记每日评论（仅使用本地模型）
    cron_hour: 23
    cron_minute: 0
  repeat_todo_check:           # 周期任务自动创建（检查重复规则的已完成任务，自动创建下一周期待办）
    interval_hours: 1
  daily_menu_generation:       # 每日食谱生成（每晚自动生成次日菜谱）
    cron_hour: 20
    cron_minute: 0

# 备份调度
backup:
  enabled: false
  cron_hour: 3
  cron_minute: 0
  encryption_password: ""   # 备份加密密码（AES-256-GCM），务必牢记！未设置时备份不会上传
